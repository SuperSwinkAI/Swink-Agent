name: Mutants

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  mutants:
    runs-on: ubuntu-latest
    # cargo-mutants rebuilds and re-tests the workspace per mutant, so a full
    # run takes hours — but it must not sit on the 360-minute GitHub default
    # when wedged.
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/rust-setup
        with:
          cache-key: mutants
      - uses: cargo-bins/cargo-binstall@ead08b90bd7b2e6d81963fb9cf0b7239f66d5db4 # v1.21.0
      - run: cargo binstall --no-confirm cargo-mutants
      - run: cargo mutants --workspace
