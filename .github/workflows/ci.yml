name: CI

on:
  push:
    branches: [main]
  pull_request:

# Parity with release.yml: warnings are hard errors everywhere, not just in
# the explicit `clippy -- -D warnings` step. Without this, a warning can pass
# CI and then fail the release build.
env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Primary gate: full pipeline, ubuntu only ─────────────────────────────
  # macOS runs the separate `check-macos` smoke below. It used to be a full
  # matrix leg, but macOS runners bill at 10x and lint/doc/feature results
  # are platform-independent — re-running fmt/typos/clippy/docs there bought
  # nothing. Platform-specific breakage (keychain, fs, linking) is what the
  # smoke's test+build still catches.
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: check

      - run: cargo fmt --check

      - name: Spell check
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1

      # --all-features so feature-gated modules are linted too: lints like
      # exhaustive_structs/exhaustive_enums can't flag code that never
      # compiles (this is exactly how adapters::AzureAuth escaped the sweep).
      # Mirrors release.yml's clippy coverage. local-llm is excluded because
      # its metal/cuda/cudnn/vulkan features need GPU toolchains unavailable
      # on hosted runners.
      - run: cargo clippy --workspace --all-features --exclude swink-agent-local-llm --all-targets --locked -- -D warnings

      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - run: cargo binstall --no-confirm --force --locked cargo-nextest

      - run: cargo nextest run --workspace --locked

      - name: Test (testkit features)
        run: cargo test --workspace --features testkit --locked

      - run: cargo build --examples --workspace --locked

      - run: cargo test --workspace --doc --locked

      - run: cargo test -p swink-agent --no-default-features --locked

      - name: Check docs
        run: cargo doc --no-deps --workspace --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── macOS smoke: platform-specific breakage only ─────────────────────────
  # Tests + build. Lints/docs/typos are platform-independent and covered by
  # `check` on ubuntu; repeating them here at 10x billing bought nothing.
  check-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: check-macos

      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - run: cargo binstall --no-confirm --force --locked cargo-nextest

      - run: cargo nextest run --workspace --locked

      - run: cargo build --examples --workspace --locked

  # ── MSRV gate: build against the declared minimum supported Rust ────────
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          version=$(awk -F'"' '/^rust-version = / { print $2; exit }' Cargo.toml)
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
          cache-key: msrv

      - run: cargo check --workspace --all-targets --locked

  # ── Feature sentinels: cheap per-PR canaries ──────────────────────────────
  # The combinatorial work (--each-feature over ~127 combos + the all-features
  # workspace test) lives in `features-full` below, off the PR critical path —
  # it recompiled the workspace once per feature on every PR. These sentinels
  # keep the highest-signal checks per-PR: the no-default-features builds and
  # single-adapter feature graphs are what actually break in practice (#1116).
  # Job name stays `features` because branch protection requires that context.
  features:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: features

      # Feature-smoke sentinels
      - name: Adapters no-default-features sentinel
        run: cargo test -p swink-agent-adapters --no-default-features --test no_default_features --locked

      - name: Adapters anthropic feature smoke
        run: cargo check -p swink-agent-adapters --no-default-features --features anthropic --locked

      - name: Adapters gemini feature smoke
        run: cargo check -p swink-agent-adapters --no-default-features --features gemini --locked

      - name: Local LLM no-default-features sentinel
        run: cargo test -p swink-agent-local-llm --no-default-features --test no_default_features --locked

      - name: Local LLM gemma4 feature smoke
        run: cargo check -p swink-agent-local-llm --no-default-features --features gemma4 --locked

      - name: Build policies example (all features)
        run: cargo build -p swink-agent-policies --all-features --example with_policies --locked

      - name: Build TUI example (all features)
        run: cargo build -p swink-agent-tui --all-features --example custom_agent --locked

  # ── Dependency policy ───────────────────────────────────────────────────
  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2

  # ── CVE scan: complements cargo-deny's advisory check ───────────────────
  # The --ignore list mirrors the `[advisories] ignore` list in deny.toml so
  # the two tools stay consistent. Keep them in sync when either changes.
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Inline toolchain (not ./.github/actions/rust-setup): cargo-audit only
      # reads Cargo.lock — no build, so the composite's rust-cache would be
      # pure overhead.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - run: cargo binstall --no-confirm --force cargo-audit

      # RUSTSEC-2024-0384 — `instant` unmaintained, transitive via
      # notify-types. Mirrors the deny.toml ignore; no upstream fix available.
      - run: cargo audit --ignore RUSTSEC-2024-0384

  # ── Windows PR smoke: cargo check only ─────────────────────────────────
  # Windows runners bill at 2x, so PRs get a compile-only gate to catch
  # platform breakage early. The full Windows suite still runs on main push
  # via `check-platform` below.
  check-windows:
    name: Windows smoke (cargo check)
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: check-windows

      - run: cargo check --workspace --all-targets --locked

  # ── Windows full suite: still main-push-only (Windows runners are expensive) ─
  check-platform:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: check-platform

      - run: cargo fmt --check

      - run: cargo clippy --workspace --locked -- -D warnings

      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - run: cargo binstall --no-confirm --force cargo-nextest

      - run: cargo nextest run --workspace --locked

      - run: cargo test --workspace --doc --locked

      - name: Check docs
        run: cargo doc --no-deps --workspace --locked
        env:
          RUSTDOCFLAGS: "-D warnings"

  # ── Semver: runs on every PR against integration or main ────────────────
  # Baseline is the LATEST RELEASE TAG, not the target branch. Semver
  # guarantees exist between releases; `integration` carries an unreleased
  # version, and comparing tree-vs-tree at the same version number makes
  # cargo-semver-checks assume a minor bump and reject changes that are
  # legal in an unreleased major line (bit #1108, then #1121). Against the
  # tag, the already-bumped workspace version declares the break honestly.
  # Once that version IS tagged, baseline and tree versions match again and
  # the gate forces the next breaking PR to bump — the version-driver
  # pattern is preserved, it just keys off releases instead of branch state.
  semver:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/rust-setup
        with:
          cache-key: semver

      - uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1

      - run: cargo binstall --no-confirm --force cargo-semver-checks

      - name: Pick baseline ref
        id: baseline
        run: |
          git fetch --tags origin
          # Exclude pre-release tags (v0.12.0-rc.1) — baseline is the last stable.
          latest_tag=$(git tag --list 'v*' --sort=-v:refname | grep -v -e - | head -1)
          if [ -n "$latest_tag" ]; then
            echo "ref=${latest_tag}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            # No release tags yet — fall back to the target branch.
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
            git fetch origin "${{ github.base_ref }}"
          else
            echo "ref=origin/main" >> "$GITHUB_OUTPUT"
            git fetch origin main
          fi

      - run: cargo semver-checks --workspace --exclude swink-agent-local-llm --baseline-rev "${{ steps.baseline.outputs.ref }}"
