name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --check

      - name: Spell check
        uses: crate-ci/typos-action@v1

      - run: cargo clippy --workspace -- -D warnings

      - uses: cargo-bins/cargo-binstall@main

      - run: cargo binstall --no-confirm cargo-nextest

      - run: cargo nextest run --workspace

      - run: cargo build --examples --workspace

      - run: cargo test --workspace --doc

      - run: cargo test -p swink-agent --no-default-features

      - name: Check docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: "-D warnings"

  features:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main

      - run: cargo binstall --no-confirm cargo-hack

      - run: cargo hack check --workspace --each-feature --no-dev-deps

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: EmbarkStudios/cargo-deny-action@v2

  semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: cargo-bins/cargo-binstall@main

      - run: cargo binstall --no-confirm cargo-semver-checks

      - run: cargo semver-checks --workspace

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.88

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --workspace
