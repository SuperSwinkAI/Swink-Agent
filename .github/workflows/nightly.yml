name: Nightly

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # Kept inline (not ./.github/actions/rust-setup): the composite always
      # installs clippy AND rustfmt, and nightly snapshots occasionally ship
      # without rustfmt, which would fail the toolchain install spuriously.
      # This job only needs clippy.
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --workspace --locked -- -D warnings
      - run: cargo test --workspace --locked
