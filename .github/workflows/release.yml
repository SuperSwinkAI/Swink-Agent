name: Release

# Triggered when a semver tag is pushed. The workflow:
#   1. Verifies the workspace (fmt, clippy, test, doc) on Linux + macOS.
#   2. Enforces a CHANGELOG entry for the tagged version.
#   3. Runs cargo publish --dry-run / cargo package --list as a packaging gate.
#   4. Publishes all workspace crates to crates.io in topological order
#      (requires the `release` environment and CARGO_REGISTRY_TOKEN secret).
#   5. Creates a GitHub release with autogenerated notes and Cargo.lock attached.
#
# Publish order (path deps replaced with registry versions by cargo):
#   swink-agent → swink-agent-macros → {adapters, memory, policies, artifacts,
#   auth, eval, local-llm, mcp, patterns, plugin-web} → swink-agent-tui
#
# A 20-second sleep between each publish gives crates.io time to index the
# crate before dependent crates attempt to resolve it.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  verify:
    name: Verify (${{ matrix.os }} / ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        toolchain: ["1.88", "stable"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: ${{ matrix.toolchain }}
          cache-key: release
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features
      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  changelog-gate:
    name: Changelog gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Ensure CHANGELOG has an entry for this tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md missing at repo root" >&2
            exit 1
          fi
          if ! grep -E "^## \[v?${version}\]" CHANGELOG.md >/dev/null; then
            echo "CHANGELOG.md has no '## [${version}]' (or '## [v${version}]') section" >&2
            exit 1
          fi
          echo "Found CHANGELOG entry for ${version}"

  publish-dry-run:
    name: cargo publish --dry-run
    needs: [verify, changelog-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: release-publish
      # Topological order: `swink-agent` is the foundation, `swink-agent-macros`
      # is independent, then the first tier of crates that only depend on core,
      # finally the TUI which depends on adapters + memory.
      #
      # Caveat: `cargo publish --dry-run` resolves path dependencies through
      # the registry (crates.io) during the pre-verify packaging step. Because
      # this workspace is private and `swink-agent` is NOT published to
      # crates.io, downstream crates cannot complete a `--dry-run` — they fail
      # with "no matching package named `swink-agent` found". For those crates
      # we use `cargo package --list`, which still exercises every piece of
      # publish metadata (license, readme, keywords, categories, exclude,
      # rust-version, version, description) without touching the registry. If
      # this workspace ever gets published upstream, switch the package-list
      # steps back to `cargo publish --dry-run`.
      - name: Dry-run publish swink-agent
        run: cargo publish --dry-run -p swink-agent --allow-dirty
      - name: Dry-run publish swink-agent-macros
        run: cargo publish --dry-run -p swink-agent-macros --allow-dirty
      - name: Package swink-agent-adapters
        run: cargo package --list --allow-dirty -p swink-agent-adapters >/dev/null
      - name: Package swink-agent-memory
        run: cargo package --list --allow-dirty -p swink-agent-memory >/dev/null
      - name: Package swink-agent-policies
        run: cargo package --list --allow-dirty -p swink-agent-policies >/dev/null
      - name: Package swink-agent-artifacts
        run: cargo package --list --allow-dirty -p swink-agent-artifacts >/dev/null
      - name: Package swink-agent-auth
        run: cargo package --list --allow-dirty -p swink-agent-auth >/dev/null
      - name: Package swink-agent-eval
        run: cargo package --list --allow-dirty -p swink-agent-eval >/dev/null
      - name: Package swink-agent-local-llm
        run: cargo package --list --allow-dirty -p swink-agent-local-llm >/dev/null
      - name: Package swink-agent-mcp
        run: cargo package --list --allow-dirty -p swink-agent-mcp >/dev/null
      - name: Package swink-agent-patterns
        run: cargo package --list --allow-dirty -p swink-agent-patterns >/dev/null
      - name: Package swink-agent-plugin-web
        run: cargo package --list --allow-dirty -p swink-agent-plugin-web >/dev/null
      - name: Package swink-agent-tui
        run: cargo package --list --allow-dirty -p swink-agent-tui >/dev/null

  publish:
    name: Publish to crates.io
    needs: publish-dry-run
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/rust-setup
        with:
          toolchain: stable
          cache-key: release-publish
      # Tier 0 — no workspace dependencies
      - name: Publish swink-agent
        run: cargo publish -p swink-agent
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-macros
        run: cargo publish -p swink-agent-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      # Tier 1 — depend only on swink-agent / swink-agent-macros
      - name: Publish swink-agent-adapters
        run: cargo publish -p swink-agent-adapters
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-memory
        run: cargo publish -p swink-agent-memory
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-policies
        run: cargo publish -p swink-agent-policies
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-artifacts
        run: cargo publish -p swink-agent-artifacts
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-auth
        run: cargo publish -p swink-agent-auth
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-eval
        run: cargo publish -p swink-agent-eval
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-local-llm
        run: cargo publish -p swink-agent-local-llm
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-mcp
        run: cargo publish -p swink-agent-mcp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-patterns
        run: cargo publish -p swink-agent-patterns
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      - name: Publish swink-agent-plugin-web
        run: cargo publish -p swink-agent-plugin-web
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 20
      # Tier 2 — depends on adapters + memory
      - name: Publish swink-agent-tui
        run: cargo publish -p swink-agent-tui
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: GitHub release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Create release and upload Cargo.lock
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            --title "${GITHUB_REF_NAME}" \
            Cargo.lock
