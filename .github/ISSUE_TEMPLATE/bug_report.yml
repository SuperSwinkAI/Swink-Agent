name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or steps that reproduce the issue.
      render: rust
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run `rustc --version` and `cargo --version` and paste the output here.
      placeholder: |
        rustc 1.95.0 (...)
        cargo 1.95.0 (...)
        OS: macOS 15 / Ubuntu 24.04 / ...
    validations:
      required: true

  - type: dropdown
    id: crate
    attributes:
      label: Affected crate
      multiple: true
      options:
        - swink-agent (core)
        - swink-agent-adapters
        - swink-agent-artifacts
        - swink-agent-auth
        - swink-agent-eval
        - swink-agent-local-llm
        - swink-agent-macros
        - swink-agent-mcp
        - swink-agent-memory
        - swink-agent-patterns
        - swink-agent-plugin-web
        - swink-agent-policies
        - swink-agent-tui
        - unsure

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, stack traces, or anything else that might help.
