[workspace_coverage]
workspace = true
locked = true
engine = "Llvm"
skip-clean = true
run-types = ["AllTargets"]
test-timeout = "10m"
output-dir = "target/tarpaulin"
# The config-file key is `out`, matching the --out CLI flag. (`generate` is
# not a tarpaulin key; it was silently ignored and no report files were
# written at all — the workflow's summary step then failed on the missing
# JSON while the run itself passed.)
out = ["Html", "Lcov", "Json"]
include-tests = false
exclude-files = [
    "target/*",
    "*/tests/*_live.rs",
]
