[package]
name = "swink-agent-local-llm"
version = "0.7.6"
edition = "2024"
rust-version = "1.88"
description = "Local on-device LLM inference for swink-agent using mistral.rs"
license = "MIT"
repository = "https://github.com/SuperSwinkAI/Swink-Agent"
readme = "../README.md"
keywords = ["llm", "local", "inference", "gguf", "embedding"]
categories = ["development-tools", "science"]

[package.metadata.docs_rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
gemma4 = []
metal = ["mistralrs/metal"]
cuda = ["mistralrs/cuda"]
cudnn = ["mistralrs/cudnn"]
flash-attn = ["mistralrs/flash-attn"]
mkl = ["mistralrs/mkl"]
accelerate = ["mistralrs/accelerate"]

[dependencies]
swink-agent = { path = "..", version = "0.7.6", default-features = false }
mistralrs = "0.8"
hf-hub = { version = "0.5", features = ["tokio"] }
tokio.workspace = true
tokio-util.workspace = true
tokio-stream.workspace = true
futures.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
swink-agent = { path = "..", version = "0.7.6", default-features = false, features = ["testkit"] }
tokio = { workspace = true, features = ["full", "test-util"] }
pretty_assertions.workspace = true

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
