[package]
name = "swink-agent-local-llm"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Local on-device LLM inference for swink-agent using mistral.rs"
license = "MIT"
repository = "https://github.com/SuperSwinkAI/Swink-Agent"
readme = "../README.md"
keywords = ["llm", "local", "inference", "gguf", "embedding"]
categories = ["development-tools", "machine-learning"]

[dependencies]
swink-agent = { path = ".." }
mistralrs = "0.7"
hf-hub = { version = "0.4", features = ["tokio"] }
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
tokio-stream = "0.1"
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }
pretty_assertions = "1"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
