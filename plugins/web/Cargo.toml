[package]
name = "swink-agent-plugin-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Web browsing plugin for swink-agent: fetch, search, screenshot, extract"
license.workspace = true
repository.workspace = true
keywords = ["llm", "agent", "web", "browse", "search"]
categories = ["development-tools", "web-programming"]

[features]
default = ["duckduckgo"]
duckduckgo = []
brave = []
tavily = []
all = ["duckduckgo", "brave", "tavily"]
integration = []

[dependencies]
swink-agent = { path = "../..", version = "0.8.0", default-features = false, features = ["plugins"] }
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["fs", "io-util", "macros", "process", "rt", "sync", "time"] }
tokio-util.workspace = true
tracing.workspace = true
thiserror.workspace = true
regex.workspace = true
url = "2"
base64 = "0.22"
scraper = "0.25"

[dev-dependencies]
wiremock.workspace = true
tokio = { workspace = true, features = ["full", "test-util"] }
pretty_assertions.workspace = true
tempfile.workspace = true

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
unnecessary_literal_bound = "allow"
missing_const_for_fn = "allow"
significant_drop_tightening = "allow"
doc_markdown = "allow"
cast_possible_truncation = "allow"
redundant_closure_for_method_calls = "allow"
manual_let_else = "allow"
format_push_string = "allow"
trivially_copy_pass_by_ref = "allow"
option_if_let_else = "allow"
