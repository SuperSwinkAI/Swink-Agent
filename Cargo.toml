[workspace]
members = [".", "adapters", "eval", "local-llm", "memory", "tui"]
resolver = "2"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
tokio-stream = "0.1"
futures = "0.3"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
reqwest = { version = "0.12", features = ["stream"] }
thiserror = "2"
rand = "0.8"
schemars = "1"
dotenvy = "0.15"
pretty_assertions = "1"
tempfile = "3"
wiremock = "0.6"

[package]
name = "swink-agent"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Core scaffolding for running LLM-powered agentic loops"
license = "MIT"
repository = "https://github.com/SuperSwinkAI/Swink-Agent"
readme = "README.md"
keywords = ["llm", "agent", "ai", "streaming", "tools"]
categories = ["development-tools", "api-bindings", "asynchronous"]

[features]
default = ["builtin-tools"]
builtin-tools = []

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-util.workspace = true
futures.workspace = true
tokio-stream.workspace = true
jsonschema = "0.28"
schemars.workspace = true
regex = "1"
uuid.workspace = true
rand.workspace = true
tracing.workspace = true

[dev-dependencies]
swink-agent-adapters = { path = "adapters" }
swink-agent-local-llm = { path = "local-llm" }
swink-agent-tui = { path = "tui" }
dotenvy.workspace = true
pretty_assertions.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["full", "test-util"] }
wiremock.workspace = true

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }

# Pedantic overrides — too noisy or stylistic
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
