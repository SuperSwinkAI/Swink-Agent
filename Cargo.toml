[workspace]
members = [".", "adapters", "tui"]
resolver = "2"

[package]
name = "agent-harness"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Core scaffolding for running LLM-powered agentic loops"
license = "MIT"
repository = "https://github.com/anthropics/agent-harness"
readme = "README.md"
keywords = ["llm", "agent", "ai", "streaming", "tools"]
categories = ["development-tools", "api-bindings", "asynchronous"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
futures = "0.3"
tokio-stream = "0.1"
jsonschema = "0.28"
regex = "1"
uuid = { version = "1", features = ["v4"] }
rand = "0.8"
reqwest = { version = "0.12", features = ["stream"] }
eventsource-stream = "0.2"
tracing = "0.1"

[dev-dependencies]
pretty_assertions = "1"
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
wiremock = "0.6"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }

# Pedantic overrides — too noisy or stylistic
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
