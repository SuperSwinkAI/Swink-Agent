[workspace]
members = [".", "adapters", "eval", "local-llm", "memory", "policies", "tui", "xtask"]
resolver = "2"

[workspace.dependencies]
serde = { version = "1", features = ["derive", "rc"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
tokio-stream = "0.1"
futures = "0.3"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
reqwest = { version = "0.12", features = ["stream"] }
thiserror = "2"
rand = "0.8"
schemars = "1"
dotenvy = "0.15"
pretty_assertions = "1"
criterion = { version = "0.5", features = ["html_reports"] }
tempfile = "3"
wiremock = "0.6"
serde_yaml = "0.9"
sha2 = "0.11"
toml = "0.8"
chrono = { version = "0.4", features = ["serde"] }
proptest = { version = "1", default-features = false, features = ["std"] }

[package]
name = "swink-agent"
version = "0.2.1"
edition = "2024"
rust-version = "1.88"
description = "Core scaffolding for running LLM-powered agentic loops"
license = "MIT"
repository = "https://github.com/SuperSwinkAI/Swink-Agent"
readme = "README.md"
keywords = ["llm", "agent", "ai", "streaming", "tools"]
categories = ["development-tools", "api-bindings", "asynchronous"]

[profile.dev]
# Faster incremental builds for contributors (especially on macOS).
split-debuginfo = "unpacked"

[profile.release]
lto = "thin"
codegen-units = 1

[package.metadata.docs_rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["builtin-tools"]
builtin-tools = []
test-helpers = []

[dependencies]
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-util.workspace = true
futures.workspace = true
tokio-stream.workspace = true
jsonschema = "0.28"
schemars.workspace = true
regex = "1"
uuid.workspace = true
rand.workspace = true
tracing.workspace = true
toml.workspace = true

[[bench]]
name = "context"
harness = false

[dev-dependencies]
swink-agent-adapters = { path = "adapters" }
swink-agent-local-llm = { path = "local-llm" }
swink-agent-tui = { path = "tui" }
dotenvy.workspace = true
pretty_assertions.workspace = true
tempfile.workspace = true
criterion.workspace = true
tokio = { workspace = true, features = ["full", "test-util"] }
wiremock.workspace = true
proptest.workspace = true

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }

# Pedantic overrides — too noisy or stylistic
module_name_repetitions = "allow"
must_use_candidate = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
