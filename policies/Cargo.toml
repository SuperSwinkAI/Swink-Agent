[package]
name = "swink-agent-policies"
version = "0.2.0"
edition = "2024"
rust-version = "1.88"
description = "Ready-to-use application-level policies for swink-agent"
license = "MIT"
repository = "https://github.com/SuperSwinkAI/Swink-Agent"
keywords = ["llm", "agent", "policy", "security", "audit"]

[features]
default = ["all"]
all = ["prompt-guard", "pii", "content-filter", "audit"]
prompt-guard = ["regex"]
pii = ["regex"]
content-filter = ["regex"]
audit = ["chrono", "serde", "serde_json"]

[dependencies]
swink-agent = { path = ".." }
regex = { version = "1", optional = true }
chrono = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
tracing = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["full", "test-util"] }

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
