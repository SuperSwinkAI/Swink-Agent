[advisories]
ignore = [
    # RUSTSEC-2024-0384 — `instant` is unmaintained (replaced by `web_time`).
    # Transitive via notify-types → instant. No direct action available until
    # the `notify` crate drops this dependency upstream.
    "RUSTSEC-2024-0384",
]

[licenses]
# `unlicensed = "deny"` was removed in cargo-deny 0.16 (see PR #611);
# crates with no detectable license now fail by default. Anything not in
# `allow` below also fails.
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "MIT-0",                   # used by `borrow-or-share` (transitive via fluent-uri)
    "CDLA-Permissive-2.0",     # used by `webpki-root-certs` (transitive via reqwest)
    "CC0-1.0",                 # used by `notify` (file-watching backend for hot-reload)
    "Zlib",                    # used by `foldhash` (transitive via jsonschema → hashbrown)
]

[bans]
multiple-versions = "warn"
# Known duplicate-major chains behind the "warn" above. All four are pulled
# in by upstream pins we cannot override; each is re-checked when the parent
# crate releases (Dependabot alerts on the first two were dismissed as
# tolerable_risk):
#   rand 0.8.x  — via ratatui-termwiz. Workspace is on rand 0.10.
#   lru  0.12.x — via tantivy (memory's optional `search` feature).
#   rand 0.9.x  — via opentelemetry_sdk 0.32 and proptest 1.11 (dev-dep).
#                 Both are the latest releases as of 2026-07 and both pin
#                 rand ^0.9; closes only when they track rand 0.10.
#   lru  0.18.x — via ratatui-core 0.1.2 (latest as of 2026-07). Coexists
#                 with tantivy's lru 0.12 pin above; closes only when tantivy
#                 catches up to lru 0.18.
wildcards = "deny"
# Internal workspace dev-deps use `path = ".."` without a `version` field
# because adding `version` forces cargo publish dry-run to resolve them via
# the registry — see CHANGELOG entry for v0.7.7. Path-only workspace deps
# are inherently safe (they only resolve locally, never published).
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
